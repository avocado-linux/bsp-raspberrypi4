default_target: raspberrypi4
supported_targets:
  - raspberrypi4

extensions:
  avocado-bsp-raspberrypi4:
    version: 2024.1.0
    release: r0
    summary: Board support for the Raspberry Pi 4
    description: Board support for the Raspberry Pi 4
    license: Apache-2.0
    url: https://github.com/avocadolinux/avocado-os
    vendor: Avocado Linux <info@avocadolinux.org>

    types:
      - sysext
      - confext

    on_merge:
      - udevadm control --reload
      - udevadm trigger --type=subsystems --action=add --settle
      - udevadm trigger --type=devices --action=add --settle

    packages:
      bluez-firmware-rpidistro-bcm4345c0-hcd: '*'
      fwup: '*'
      kernel-module-bcm2835-codec: '*'
      kernel-module-bcm2835-isp: '*'
      kernel-module-bcm2835-mmal-vchiq: '*'
      kernel-module-bcm2835-v4l2: '*'
      kernel-module-bluetooth: '*'
      kernel-module-brcmfmac: '*'
      kernel-module-brcmfmac-wcc: '*'
      kernel-module-brcmutil: '*'
      kernel-module-btbcm: '*'
      kernel-module-cfg80211: '*'
      kernel-module-dwc2: '*'
      kernel-module-ecc: '*'
      kernel-module-ecdh-generic: '*'
      kernel-module-fuse: '*'
      kernel-module-gpu-sched: '*'
      kernel-module-hci-uart: '*'
      kernel-module-i2c-dev: '*'
      kernel-module-i2c-mux: '*'
      kernel-module-i2c-mux-pinctrl: '*'
      kernel-module-ipv6: '*'
      kernel-module-libaes: '*'
      kernel-module-lz4: '*'
      kernel-module-lz4-compress: '*'
      kernel-module-mc: '*'
      kernel-module-raspberrypi-gpiomem: '*'
      kernel-module-raspberrypi-hwmon: '*'
      kernel-module-rfkill: '*'
      kernel-module-rtc-pcf85063: '*'
      kernel-module-sch-fq-codel: '*'
      kernel-module-snd-bcm2835: '*'
      kernel-module-uio: '*'
      kernel-module-uio-pdrv-genirq: '*'
      kernel-module-v3d: '*'
      kernel-module-v4l2-mem2mem: '*'
      kernel-module-vc-sm-cma: '*'
      kernel-module-videobuf2-common: '*'
      kernel-module-videobuf2-dma-contig: '*'
      kernel-module-videobuf2-memops: '*'
      kernel-module-videobuf2-v4l2: '*'
      kernel-module-videobuf2-vmalloc: '*'
      kernel-module-videodev: '*'
      kernel-module-zram: '*'
      linux-firmware-rpidistro-bcm43455: '*'

    # 6.6 (linux-raspberrypi 6.6) ships the HEVC decoder under the older
    # rpivid-hevc name.
    kernel-6.6.*:
      packages:
        kernel-module-rpivid-hevc: '*'

    # 6.12 (linux-raspberrypi 6.12) renamed the HEVC decoder driver upstream
    # to rpi-hevc-dec.
    kernel-6.12.*:
      packages:
        kernel-module-rpi-hevc-dec: '*'

sdk:
  image: docker.io/avocadolinux/sdk:{{ env.AVOCADO_DISTRO_RELEASE }}-{{ env.AVOCADO_DISTRO_CHANNEL }}
